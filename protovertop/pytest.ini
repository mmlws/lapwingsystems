[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
markers =
    unit: Unit tests for individual functions
    integration: End-to-end integration tests with obvious solutions
    constraints: Constraint validation tests
    edge: Edge case and robustness tests
    slow: Tests that take >1 second to run
